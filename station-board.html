<!DOCTYPE html>
<html>
<head>

<title>Station Display</title>

<style>

body{
background:black;
color:#00ff9c;
font-family:monospace;
padding:30px;
}

h1{
text-align:center;
font-size:40px;
margin-bottom:30px;
}

table{
width:100%;
border-collapse:collapse;
font-size:28px;
}

th{
text-align:left;
border-bottom:2px solid #00ff9c;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #033;
}

.next{
color:#ffff00;
font-weight:bold;
}

.clock{
position:absolute;
top:20px;
right:40px;
font-size:24px;
}

</style>

</head>

<body>

<div class="clock" id="clock"></div>

<h1>STATION ARRIVAL BOARD</h1>

<table>

<thead>
<tr>
<th>TRAIN</th>
<th>STATION</th>
<th>ARRIVAL</th>
</tr>
</thead>

<tbody id="board"></tbody>

</table>

<script>

let data=[];

fetch("data.json")
.then(res=>res.json())
.then(json=>{
data=json;
renderBoard();
});

function renderBoard(){

let board=document.getElementById("board");

let rows=data
.filter(d=>d.arrival)
.sort((a,b)=>a.arrival.localeCompare(b.arrival))
.slice(0,10);

let html="";

rows.forEach((r,i)=>{

html+=`
<tr class="${i==0?'next':''}">
<td>${r.train_no}</td>
<td>${r.station_name}</td>
<td>${r.arrival}</td>
</tr>
`;

});

board.innerHTML=html;

}

function updateClock(){

let now=new Date();

let time=now.toLocaleTimeString();

document.getElementById("clock").innerHTML=time;

}

setInterval(updateClock,1000);

</script>

</body>
</html>
