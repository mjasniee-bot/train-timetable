<!DOCTYPE html>

<html>
<head>

<title>Station Arrival Board</title>

<style>

body{
background:black;
color:#00ff9c;
font-family:monospace;
padding:30px;
}

h1{
text-align:center;
font-size:40px;
margin-bottom:30px;
}

table{
width:100%;
border-collapse:collapse;
font-size:28px;
}

th{
text-align:left;
border-bottom:2px solid #00ff9c;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #033;
}

.next{
color:yellow;
font-weight:bold;
}

.clock{
position:absolute;
top:20px;
right:40px;
font-size:24px;
}

</style>

</head>

<body>

<div class="clock" id="clock"></div>

<h1>STATION ARRIVAL BOARD</h1>

<table>

<thead>
<tr>
<th>TRAIN</th>
<th>STATION</th>
<th>ARRIVAL</th>
<th>MIN ARR</th>
<th>DEPARTURE</th>
<th>MIN DEP</th>
</tr>
</thead>

<tbody id="board"></tbody>

</table>

<script>

let data=[];

fetch("data.json")
.then(res=>res.json())
.then(json=>{
data=json;
renderBoard();
});

function getMinutes(time){

if(!time) return "-";

let now=new Date();

let currentMinutes=now.getHours()*60+now.getMinutes();

let [h,m]=time.split(":");

let targetMinutes=parseInt(h)*60+parseInt(m);

return targetMinutes-currentMinutes;

}

function getEventTime(row){
return row.arrival || row.departure;
}


// VALIDITY PER TRAIN
function getValidRows(rows){

const today=new Date()
const validSet=new Set(rows.map(r=>r.valid_from))

if(validSet.size>1){

return rows.filter(r=>{
let from=new Date(r.valid_from)
let to=new Date(r.valid_to)
return today>=from && today<=to
})

}

return rows

}


function renderBoard(){

// GROUP BY TRAIN
let trainGroups={}

data
.filter(d=>d.station_name && d.station_name!="Unknown")
.forEach(d=>{

if(!trainGroups[d.train_no]){
trainGroups[d.train_no]=[]
}

trainGroups[d.train_no].push(d)

})

let rows=[]


// APPLY VALIDITY
Object.keys(trainGroups).forEach(trainNo=>{

let group=getValidRows(trainGroups[trainNo])

group.forEach(r=>{

let eventTime=getEventTime(r)

rows.push({
...r,
eventTime:eventTime,
minutesEvent:getMinutes(eventTime),
minutesArrival:getMinutes(r.arrival),
minutesDeparture:getMinutes(r.departure)
})

})

})


// FILTER TIME
rows=rows.filter(d=>d.minutesEvent>=0)


// REMOVE DUPLICATE (NEAREST)
let unique={}

rows.forEach(r=>{

if(!unique[r.train_no] || r.minutesEvent < unique[r.train_no].minutesEvent){
unique[r.train_no]=r
}

})

rows=Object.values(unique)


// SORT
rows.sort((a,b)=>a.minutesEvent-b.minutesEvent)

rows=rows.slice(0,10)


// RENDER
let html=""

rows.forEach((r,i)=>{

html+=`
<tr class="${i==0?'next':''}">
<td>${r.train_no}${r.train_service=="A"?"*":""}</td>
<td>${r.station_name}</td>
<td>${r.arrival||"-"}</td>
<td>${r.minutesArrival}</td>
<td>${r.departure||"-"}</td>
<td>${r.minutesDeparture}</td>
</tr>
`

})

document.getElementById("board").innerHTML=html

}


// CLOCK
function updateClock(){
document.getElementById("clock").innerHTML=new Date().toLocaleTimeString()
}

setInterval(updateClock,1000)
setInterval(renderBoard,30000)

</script>

</body>
</html>
