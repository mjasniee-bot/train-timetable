<!DOCTYPE html>
<html>
<head>

<title>PIDS Display</title>

<style>

body{
background:black;
color:#00ff9c;
font-family:monospace;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.title{
font-size:40px;
}

.clock{
font-size:30px;
}

table{
width:100%;
border-collapse:collapse;
font-size:30px;
}

th{
text-align:left;
border-bottom:2px solid #00ff9c;
padding:10px;
}

td{
padding:12px;
border-bottom:1px solid #033;
}

.next{
color:yellow;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">

<div class="title">🚆 PASSENGER INFORMATION DISPLAY</div>

<div class="clock" id="clock"></div>

</div>

<div style="margin-bottom:20px">

<a href="index.html">
<button style="background:#334155">🏠 Home</button>
</a>

</div>

<table>

<thead>

<tr>
<th>TRAIN</th>
<th>STATION</th>
<th>ARRIVAL</th>
<th>MIN</th>
<th>STATUS</th>
</tr>

</thead>

<tbody id="board"></tbody>

</table>

<script>

let data=[];

fetch("data.json")
.then(res=>res.json())
.then(json=>{
data=json;
renderBoard();
});

function getMinutes(arrival){

let now=new Date();

let currentMinutes=now.getHours()*60+now.getMinutes();

let parts=arrival.split(":");

let arrivalMinutes=parseInt(parts[0])*60+parseInt(parts[1]);

return arrivalMinutes-currentMinutes;

}

function renderBoard(){

let board=document.getElementById("board");

let rows=data
.filter(d=>d.arrival)
.map(d=>{

return{
...d,
minutes:getMinutes(d.arrival)
}

})
.filter(d=>d.minutes>=0)
.sort((a,b)=>a.minutes-b.minutes)
.slice(0,12);

let html="";

rows.forEach((r,i)=>{

let status=i==0 ? "ARRIVING" : "ON TIME";

html+=`
<tr class="${i==0?'next':''}">
<td>${r.train_no}</td>
<td>${r.station_name}</td>
<td>${r.arrival}</td>
<td>${r.minutes}</td>
<td>${status}</td>
</tr>
`;

});

board.innerHTML=html;

}

function updateClock(){

let now=new Date();

document.getElementById("clock").innerHTML=
now.toLocaleTimeString();

}

setInterval(updateClock,1000);

setInterval(renderBoard,30000);

</script>

</body>
</html>
