<!DOCTYPE html>

<html>
<head>
<title>PIDS Admin</title>
</head>

<body>

<h2>Admin Panel</h2>

<label>
<input type="checkbox" id="toggleAdditional"> Show Additional Train
</label>

<br><br>

<div id="list"></div>

<script>

let data=[]
let liveData={ train_control:{}, settings:{ show_additional:true } }

async function load(){

  const res = await fetch("data.json")
  data = await res.json()

  const stored = localStorage.getItem("liveData")
  if(stored){
    liveData = JSON.parse(stored)
  }

  render()

}

load()

function render(){

  document.getElementById("toggleAdditional").checked = liveData.settings.show_additional

  const trains=[...new Set(data.map(d=>d.train_no))]

  let html=""

  trains.forEach(t=>{

    const c = liveData.train_control[t] || {}

    html += `
    <div>
      ${t}
      <select id="s_${t}">
        <option value="R">Running</option>
        <option value="X">Stop</option>
      </select>

      Delay:
      <input id="d_${t}" type="number" value="${c.delay_min || 0}">

      <button onclick="save('${t}')">Save</button>
    </div>
    `

  })

  document.getElementById("list").innerHTML = html

}

function save(train){

  const status = document.getElementById("s_"+train).value
  const delay = Number(document.getElementById("d_"+train).value)

  liveData.train_control[train] = {
    running: status,
    delay_min: delay
  }

  localStorage.setItem("liveData", JSON.stringify(liveData))

  alert("Saved")

}

document.getElementById("toggleAdditional").addEventListener("change", function(){

  liveData.settings.show_additional = this.checked
  localStorage.setItem("liveData", JSON.stringify(liveData))

})

</script>

</body>
</html>
