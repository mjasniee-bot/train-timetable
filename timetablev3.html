<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<title>Train Timetable</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:20px;
}

h1{
color:#00ffcc;
}

nav{
margin-bottom:20px;
}

nav a{
color:white;
margin-right:15px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#00ffcc;
}

select{
padding:8px;
margin-right:10px;
}

button{
padding:8px 15px;
cursor:pointer;
}

.filterBox{
margin-top:15px;
margin-bottom:15px;
}

table{
border-collapse:collapse;
width:100%;
margin-top:20px;
}

th,td{
border:1px solid #444;
padding:8px;
text-align:center;
}

th{
background:#00ffcc;
color:black;
}

tr:nth-child(even){
background:#222;
}

.additionalTrain{
background:#5c4a00;
}

.cancelledTrain{
background:#5a0000;
}

.note{
margin-top:10px;
color:#aaa;
font-size:12px;
}

.trainLink{
cursor:pointer;
color:#00ffcc;
font-weight:bold;
}

.trainLink:hover{
text-decoration:underline;
}

/* ROUTE POPUP */

#routePopup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:20px;
border:1px solid #00ffcc;
width:400px;
max-height:500px;
overflow:auto;
}

#routePopup h3{
margin-top:0;
color:#00ffcc;
}

#routePopup button{
margin-top:10px;
}

</style>

</head>

<body>

<nav>

<a href="index.html">Home</a> <a href="timetable.html">Timetable</a> <a href="station-board.html">Station Board</a> <a href="station-search.html">Station Search</a> <a href="platform-board.html">Platform Board</a> <a href="pids.html">PIDS</a>

</nav>

<h1>Train Timetable</h1>

<select id="trainSelect">
<option value="">Select Train</option>
</select>

<select id="stationSelect">
<option value="">Select Station</option>
</select>

<button onclick="searchTrain()">Search</button>

<div class="filterBox">

<b>Train Service:</b>

<label>
<input type="checkbox" id="normalTrain" checked> Normal (N)
</label>

<label>
<input type="checkbox" id="additionalTrain"> Additional (A)
</label>

  

<b>Train Running:</b>

<label>
<input type="checkbox" id="runningTrain" checked> Running (R)
</label>

<label>
<input type="checkbox" id="notRunningTrain"> Not Running (X)
</label>

</div>

<table id="resultTable">

<thead>
<tr>
<th>Train</th>
<th>Station</th>
<th>Arrival</th>
<th>Departure</th>
<th>Service</th>
</tr>
</thead>

<tbody></tbody>

</table>

<div class="note">
* Additional Train
</div>

<div id="routePopup">

<h3 id="routeTitle"></h3>

<div id="routeStations"></div>

<button onclick="closeRoute()">Close</button>

</div>

<script>

let data=[]

async function loadData(){

const res=await fetch("data.json")
data=await res.json()

populateLOV()

}

loadData()

function populateLOV(){

const trainSet=new Set()
const stationSet=new Set()

data.forEach(d=>{

if(d.station_name!="Unknown"){

trainSet.add(d.train_no)
stationSet.add(d.station_name)

}

})

const trainSelect=document.getElementById("trainSelect")
const stationSelect=document.getElementById("stationSelect")

Array.from(trainSet).sort().forEach(t=>{

let opt=document.createElement("option")
opt.value=t
opt.text=t

trainSelect.appendChild(opt)

})

Array.from(stationSet).sort().forEach(s=>{

let opt=document.createElement("option")
opt.value=s
opt.text=s

stationSelect.appendChild(opt)

})

}

function isValidTrain(train){

const today=new Date()

const from=new Date(train.valid_from)
const to=new Date(train.valid_to)

return today>=from && today<=to

}

function searchTrain(){

const trainNo=document.getElementById("trainSelect").value
const station=document.getElementById("stationSelect").value

const normalTrain=document.getElementById("normalTrain").checked
const additionalTrain=document.getElementById("additionalTrain").checked

const runningTrain=document.getElementById("runningTrain").checked
const notRunningTrain=document.getElementById("notRunningTrain").checked

let results=data

results=results.filter(d=>isValidTrain(d))

results=results.filter(d=>d.station_name!="Unknown")

results=results.filter(d=>{

if(d.train_service=="N" && normalTrain) return true
if(d.train_service=="A" && additionalTrain) return true

return false

})

results=results.filter(d=>{

if(d.train_running=="R" && runningTrain) return true
if(d.train_running=="X" && notRunningTrain) return true

return false

})

if(trainNo){

results=results.filter(d=>d.train_no==trainNo)

}

if(station){

results=results.filter(d=>d.station_name==station)

}

results.sort((a,b)=>{

if(a.arrival && b.arrival)
return a.arrival.localeCompare(b.arrival)

if(a.departure && b.departure)
return a.departure.localeCompare(b.departure)

return 0

})

renderTable(results)

}

function renderTable(rows){

const tbody=document.querySelector("#resultTable tbody")
tbody.innerHTML=""

rows.forEach(r=>{

let trainDisplay=r.train_no

if(r.train_service=="A"){
trainDisplay=r.train_no+"*"
}

let rowClass=""

if(r.train_service=="A"){
rowClass="additionalTrain"
}

if(r.train_running=="X"){
rowClass="cancelledTrain"
}

const tr=document.createElement("tr")

tr.className=rowClass

tr.innerHTML=`

<td class="trainLink" onclick="showRoute('${r.train_no}')">${trainDisplay}</td>
<td>${r.station_name}</td>
<td>${r.arrival || "-"}</td>
<td>${r.departure || "-"}</td>
<td>${r.train_service}</td>

`

tbody.appendChild(tr)

})

}

function showRoute(trainNo){

const route=data
.filter(d=>d.train_no==trainNo)
.filter(d=>d.station_name!="Unknown")

route.sort((a,b)=>{

if(a.arrival && b.arrival)
return a.arrival.localeCompare(b.arrival)

if(a.departure && b.departure)
return a.departure.localeCompare(b.departure)

return 0

})

const origin=route[0].station_name
const destination=route[route.length-1].station_name

document.getElementById("routeTitle").innerText=trainNo+" : "+origin+" → "+destination

let html="<ul>"

route.forEach(r=>{

html+="<li>"+r.station_name+"</li>"

})

html+="</ul>"

document.getElementById("routeStations").innerHTML=html

document.getElementById("routePopup").style.display="block"

}

function closeRoute(){

document.getElementById("routePopup").style.display="none"

}

</script>

</body>

</html>
