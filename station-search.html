<!DOCTYPE html>

<html>
<head>

<title>Station Train Search</title>

<style>

body{

color:#00ff9c;
font-family:monospace;

}

h1{
text-align:center;
font-size:36px;

}

select{
padding:10px;

}

table{
width:100%;

}

}

color:yellow;
font-weight:bold;
}

</style>

</head>

<body>

<div style="margin-bottom:20px">

<a href="index.html"><button>🏠 Home</button></a>
<a href="timetable.html"><button>Timetable</button></a>
<a href="station-board3.html"><button>Station Board</button></a>

</div>

<div class="clock" id="clock"></div>

<h1>STATION TRAIN SEARCH</h1>

<select id="stationList"></select>

<button onclick="searchStation()">Search</button>

<table>

<thead>
<tr>
<th>TRAIN</th>
<th>STATION</th>
<th>ARRIVAL</th>
<th>MIN ARR</th>
<th>DEPARTURE</th>
<th>MIN DEP</th>
</tr>
</thead>

<tbody id="board"></tbody>

</table>

<script>

let data=[];

fetch("data.json")
.then(res=>res.json())
.then(json=>{
data=json;
populateStations();
});

function populateStations(){

let stations=[...new Set(
data
.filter(d=>d.station_name && d.station_name!="Unknown")
.map(d=>d.station_name)
)];

let select=document.getElementById("stationList");

stations.sort().forEach(s=>{
let opt=document.createElement("option");
opt.value=s;
opt.text=s;
select.appendChild(opt);
});

}

function getMinutes(time){

if(!time) return "-";

let now=new Date();

let currentMinutes=now.getHours()*60+now.getMinutes();

let [h,m]=time.split(":");

let targetMinutes=parseInt(h)*60+parseInt(m);

return targetMinutes-currentMinutes;

}

function getEventTime(row){
return row.arrival || row.departure;
}


// VALIDITY
function getValidRows(rows){

const today=new Date()
const validSet=new Set(rows.map(r=>r.valid_from))

if(validSet.size>1){

return rows.filter(r=>{
let from=new Date(r.valid_from)
let to=new Date(r.valid_to)
return today>=from && today<=to
})

}

return rows

}


function searchStation(){

let station=document.getElementById("stationList").value

let trainGroups={}

data
.filter(d=>d.station_name==station)
.forEach(d=>{

if(!trainGroups[d.train_no]){
trainGroups[d.train_no]=[]
}

trainGroups[d.train_no].push(d)

})

let rows=[]


// APPLY VALIDITY
Object.keys(trainGroups).forEach(trainNo=>{

let group=getValidRows(trainGroups[trainNo])

group.forEach(r=>{

let eventTime=getEventTime(r)

rows.push({
...r,
eventTime:eventTime,
minutesEvent:getMinutes(eventTime),
minutesArrival:getMinutes(r.arrival),
minutesDeparture:getMinutes(r.departure)
})

})

})


// FILTER TIME
rows=rows.filter(d=>d.minutesEvent>=0 && d.minutesEvent<=300)


// REMOVE DUPLICATE
let unique={}

rows.forEach(r=>{

if(!unique[r.train_no] || r.minutesEvent < unique[r.train_no].minutesEvent){
unique[r.train_no]=r
}

})

rows=Object.values(unique)


// SORT
rows.sort((a,b)=>a.minutesEvent-b.minutesEvent)


// RENDER
let html=""

rows.forEach((r,i)=>{

html+=`
<tr class="${i==0?'next':''}">
<td>${r.train_no}${r.train_service=="A"?"*":""}</td>
<td>${r.station_name}</td>
<td>${r.arrival||"-"}</td>
<td>${r.minutesArrival}</td>
<td>${r.departure||"-"}</td>
<td>${r.minutesDeparture}</td>
</tr>
`

})

document.getElementById("board").innerHTML=html

}

// CLOCK
function updateClock(){
let now=new Date();
document.getElementById("clock").innerHTML=now.toLocaleTimeString();
}

setInterval(updateClock,1000);
setInterval(showBoard,30000);

</script>

</body>
</html>
