<h1>PLATFORM PASSENGER BOARD</h1>

<select id="stationList"></select>

<button onclick="showBoard()">Show</button>
Nota : Paparan ini berdasarkan jadual waktu yang telah dirancang sahaja untuk rujukan. Ianya tidak terpakai sekiranya berlaku kelewatan
<table>

<thead>
<tr>
<th>TRAIN</th>
<th>ORIGIN</th>
<th>DESTINATION</th>
<th>ARRIVAL</th>
<th>MIN ARR</th>
<th>DEPARTURE</th>
<th>MIN DEP</th>
</tr>
</thead>

<tbody id="board"></tbody>

</table>

<script>

let data=[];

fetch("data.json")
.then(res=>res.json())
.then(json=>{
data=json;
populateStations();
});


// =========================
// VALIDITY FILTER (PER TRAIN)
// =========================

function getValidRows(rows){

const today=new Date()

const validSet=new Set(rows.map(r=>r.valid_from))

// multiple timetable
if(validSet.size>1){

return rows.filter(r=>{

const from=new Date(r.valid_from)
const to=new Date(r.valid_to)

return today>=from && today<=to

})

}

// single timetable
return rows

}


// =========================
// POPULATE STATIONS
// =========================

function populateStations(){

let stations=[...new Set(
data
.filter(d=>d.station_name && d.station_name!="Unknown")
.map(d=>d.station_name)
)];

let select=document.getElementById("stationList");

stations.sort().forEach(s=>{
let opt=document.createElement("option");
opt.value=s;
opt.text=s;
select.appendChild(opt);
});

}


// =========================
// TIME FUNCTIONS
// =========================

function getMinutes(time){

if(!time) return "-";

let now=new Date();

let currentMinutes=now.getHours()*60+now.getMinutes();

let parts=time.split(":");

let targetMinutes=parseInt(parts[0])*60+parseInt(parts[1]);

return targetMinutes-currentMinutes;

}

function getEventTime(row){

if(row.arrival && row.arrival!="-"){
return row.arrival;
}

return row.departure;

}


// =========================
// ROUTE INFO
// =========================

function getRoute(trainNo){

let route=data
.filter(d=>d.train_no==trainNo)
.filter(d=>d.station_name && d.station_name!="Unknown")

route.sort((a,b)=>a.tmt_seq_no-b.tmt_seq_no)

return {
origin:route[0].station_name,
destination:route[route.length-1].station_name
}

}


// =========================
// MAIN BOARD FUNCTION
// =========================

function showBoard(){

let station=document.getElementById("stationList").value;

// STEP 1: group by train
let trainGroups={};

data
.filter(d=>d.station_name==station)
.forEach(d=>{

if(!trainGroups[d.train_no]){
trainGroups[d.train_no]=[]
}

trainGroups[d.train_no].push(d)

});

let rows=[];


// STEP 2: apply validity per train
Object.keys(trainGroups).forEach(trainNo=>{

let group=trainGroups[trainNo]

// apply validity logic
let validRows=getValidRows(group)

// ambil row paling relevant (arrival/nearest)
validRows.forEach(r=>{

let eventTime=getEventTime(r)

rows.push({
...r,
eventTime:eventTime,
minutesEvent:getMinutes(eventTime),
minutesArrival:getMinutes(r.arrival),
minutesDeparture:getMinutes(r.departure),
...getRoute(trainNo)
})

})

});


// STEP 3: filter time window
rows=rows
.filter(d=>d.minutesEvent>=0 && d.minutesEvent<=360)


// STEP 4: remove duplicate train (keep nearest)
let uniqueTrain={};

rows.forEach(r=>{

if(!uniqueTrain[r.train_no]){
uniqueTrain[r.train_no]=r
}else{

if(r.minutesEvent < uniqueTrain[r.train_no].minutesEvent){
uniqueTrain[r.train_no]=r
}

}

});

rows=Object.values(uniqueTrain)


// STEP 5: sort
rows.sort((a,b)=>a.minutesEvent-b.minutesEvent)

rows=rows.slice(0,10)


// =========================
// RENDER
// =========================

let html="";

rows.forEach((r,i)=>{

html+=`
<tr class="${i==0?'next':''}">
<td>${r.train_no}${r.train_service=="A"?"*":""}</td>
<td>${r.origin}</td>
<td>${r.destination}</td>
<td>${r.arrival||"-"}</td>
<td>${r.minutesArrival}</td>
<td>${r.departure||"-"}</td>
<td>${r.minutesDeparture}</td>
</tr>
`;

});

document.getElementById("board").innerHTML=html;

}


// CLOCK
function updateClock(){
let now=new Date();
document.getElementById("clock").innerHTML=now.toLocaleTimeString();
}

setInterval(updateClock,1000);
setInterval(showBoard,30000);

</script>
