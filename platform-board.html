<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<title>Platform Board</title>

<style>

body{
font-family:Arial;
background:black;
color:#00ffcc;
padding:20px;
}

h1{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
font-size:18px;
}

th,td{
border:1px solid #00ffcc;
padding:10px;
text-align:center;
}

th{
background:#003333;
}

tr:nth-child(even){
background:#001a1a;
}

.cancelled{
background:#550000;
color:white;
}

</style>

</head>

<body>

<h1>PLATFORM BOARD</h1>

<select id="stationSelect"></select>

<button onclick="loadBoard()">Search</button>

<table>

<thead>
<tr>
<th>Train</th>
<th>Destination</th>
<th>Arrival</th>
<th>Departure</th>
</tr>
</thead>

<tbody id="board"></tbody>

</table>

<script>

let data=[]


// LOAD DATA
async function init(){

const res = await fetch("data.json")
data = await res.json()

populateStations()

}

init()


// POPULATE STATION
function populateStations(){

const stationSet = new Set()

data.forEach(d=>{

if(d.station_name!="Unknown"){
stationSet.add(d.station_name)
}

})

const select = document.getElementById("stationSelect")

Array.from(stationSet).sort().forEach(s=>{

let opt=document.createElement("option")
opt.value=s
opt.text=s

select.appendChild(opt)

})

}


// ======================
// VALIDITY FILTER
// ======================

function filterByValidity(rows){

const today=new Date()

const trainGroups={}

rows.forEach(r=>{

if(!trainGroups[r.train_no]){
trainGroups[r.train_no]=[]
}

trainGroups[r.train_no].push(r)

})

let result=[]

Object.values(trainGroups).forEach(group=>{

const validSet=new Set(group.map(g=>g.valid_from))

// multiple timetable
if(validSet.size>1){

group.forEach(g=>{

const from=new Date(g.valid_from)
const to=new Date(g.valid_to)

if(today>=from && today<=to){
result.push(g)
}

})

}

// single timetable
else{

result.push(...group)

}

})

return result

}


// ======================
// GET DESTINATION
// ======================

function getDestination(trainNo){

const route = data
.filter(d=>d.train_no==trainNo)
.filter(d=>d.station_name!="Unknown")

route.sort((a,b)=>a.tmt_seq_no-b.tmt_seq_no)

return route[route.length-1].station_name

}


// ======================
// LOAD BOARD
// ======================

function loadBoard(){

const station = document.getElementById("stationSelect").value

let rows = data

// remove unknown
rows = rows.filter(d=>d.station_name!="Unknown")

// validity filter
rows = filterByValidity(rows)

// filter station
rows = rows.filter(d=>d.station_name==station)

// running train only
rows = rows.filter(d=>d.train_running=="R")


// sort arrival
rows.sort((a,b)=>{

if(a.arrival && b.arrival)
return a.arrival.localeCompare(b.arrival)

return 0

})


render(rows)

}


// ======================
// RENDER
// ======================

function render(rows){

const tbody = document.getElementById("board")
tbody.innerHTML=""

rows.forEach(r=>{

let trainDisplay = r.train_no

if(r.train_service=="A"){
trainDisplay = r.train_no + "*"
}

const tr=document.createElement("tr")

if(r.train_running=="X"){
tr.className="cancelled"
}

tr.innerHTML=`

<td>${trainDisplay}</td>
<td>${getDestination(r.train_no)}</td>
<td>${r.arrival || "-"}</td>
<td>${r.departure || "-"}</td>

`

tbody.appendChild(tr)

})

}

</script>

</body>

</html>
