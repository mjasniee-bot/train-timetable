<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<title>Platform Board</title>

<style>

body{
font-family:Arial;
background:black;
color:#00ffcc;
padding:20px;
}

h1{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
font-size:16px;
}

th,td{
border:1px solid #00ffcc;
padding:8px;
text-align:center;
}

th{
background:#003333;
}

tr:nth-child(even){
background:#001a1a;
}

.cancelled{
background:#550000;
color:white;
}

</style>

</head>

<body>

<h1>PLATFORM BOARD</h1>

<select id="stationSelect"></select> <button onclick="loadBoard()">Search</button>

<table>

<thead>
<tr>
<th>Train</th>
<th>Origin</th>
<th>Destination</th>
<th>Arrival</th>
<th>Min</th>
<th>Departure</th>
<th>Min</th>
<th>Service</th>
<th>Status</th>
</tr>
</thead>

<tbody id="board"></tbody>

</table>

<script>

let data=[]


// LOAD DATA
async function init(){

const res = await fetch("data.json")
data = await res.json()

populateStations()

}

init()


// POPULATE STATION
function populateStations(){

const stationSet=new Set()

data.forEach(d=>{
if(d.station_name!="Unknown"){
stationSet.add(d.station_name)
}
})

const select=document.getElementById("stationSelect")

Array.from(stationSet).sort().forEach(s=>{

let opt=document.createElement("option")
opt.value=s
opt.text=s

select.appendChild(opt)

})

}


// VALIDITY FILTER
function filterByValidity(rows){

const today=new Date()

const trainGroups={}

rows.forEach(r=>{
if(!trainGroups[r.train_no]){
trainGroups[r.train_no]=[]
}
trainGroups[r.train_no].push(r)
})

let result=[]

Object.values(trainGroups).forEach(group=>{

const validSet=new Set(group.map(g=>g.valid_from))

if(validSet.size>1){

group.forEach(g=>{
const from=new Date(g.valid_from)
const to=new Date(g.valid_to)

if(today>=from && today<=to){
result.push(g)
}
})

}else{

result.push(...group)

}

})

return result

}


// GET ROUTE INFO
function getRoute(trainNo){

const route=data
.filter(d=>d.train_no==trainNo)
.filter(d=>d.station_name!="Unknown")

route.sort((a,b)=>a.tmt_seq_no-b.tmt_seq_no)

return {
origin:route[0].station_name,
destination:route[route.length-1].station_name
}

}


// MINUTES CALC
function getMinutes(time){

if(!time) return "-"

const now=new Date()

const [h,m]=time.split(":")
const t=new Date()

t.setHours(h)
t.setMinutes(m)
t.setSeconds(0)

const diff=Math.floor((t-now)/60000)

return diff>=0 ? diff : "-"

}


// STATUS
function getStatus(min){

if(min=="-") return ""

if(min<=0) return "Arriving"
if(min<=5) return "Boarding"

return "On Time"

}


// LOAD BOARD
function loadBoard(){

const station=document.getElementById("stationSelect").value

let rows=data

// remove unknown
rows=rows.filter(d=>d.station_name!="Unknown")

// validity
rows=filterByValidity(rows)

// station filter
rows=rows.filter(d=>d.station_name==station)

// running only
rows=rows.filter(d=>d.train_running=="R")


// sort arrival
rows.sort((a,b)=>{

if(a.arrival && b.arrival)
return a.arrival.localeCompare(b.arrival)

return 0

})


render(rows)

}


// RENDER
function render(rows){

const tbody=document.getElementById("board")
tbody.innerHTML=""

rows.forEach(r=>{

let trainDisplay=r.train_no

if(r.train_service=="A"){
trainDisplay=r.train_no+"*"
}

const route=getRoute(r.train_no)

const arrMin=getMinutes(r.arrival)
const depMin=getMinutes(r.departure)

const status=getStatus(arrMin)

const tr=document.createElement("tr")

if(r.train_running=="X"){
tr.className="cancelled"
}

tr.innerHTML=`

<td>${trainDisplay}</td>
<td>${route.origin}</td>
<td>${route.destination}</td>
<td>${r.arrival || "-"}</td>
<td>${arrMin}</td>
<td>${r.departure || "-"}</td>
<td>${depMin}</td>
<td>${r.train_service}</td>
<td>${status}</td>

`

tbody.appendChild(tr)

})

}

</script>

</body>

</html>
