<!DOCTYPE html>

<html>

<head>
<meta charset="UTF-8">
<title>PIDS TV Display</title>

<style>

body{
  background:black;
  color:#00ff9c;
  font-family:monospace;
  margin:0;
  overflow:hidden;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  font-size:30px;
}

.clock{
  color:white;
}

h1{
  text-align:center;
  font-size:50px;
  margin:0;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:40px;
  margin-top:20px;
}

th,td{
  padding:20px;
  text-align:left;
}

th{
  border-bottom:3px solid #00ff9c;
}

.next{
  color:yellow;
  font-weight:bold;
}

.delayed{
  color:orange;
}

.finalcall{
  color:red;
  animation: blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}

.boarding{
  color:cyan;
}

.arriving{
  color:lime;
}

</style>

</head>

<body>

<div class="header">
  <div id="stationName">STATION</div>
  <div class="clock" id="clock"></div>
</div>

<h1>DEPARTURES</h1>

<table>
<thead>
<tr>
<th>Train</th>
<th>Destination</th>
<th>Time</th>
<th>Status</th>
</tr>
</thead>

<tbody id="board"></tbody>

</table>

<script>

let data=[]
let liveData={}
let currentRows=[]
let page=0

const PAGE_SIZE=6


// ================= LOAD =================

async function loadData(){

  const res = await fetch("data.json")
  data = await res.json()

  const stored = localStorage.getItem("liveData")

  if(stored){
    liveData = JSON.parse(stored)
  }else{
    liveData = { train_control:{}, settings:{ show_additional:true } }
  }

}

loadData()
setInterval(loadData,5000)


// ================= CLOCK =================

function updateClock(){
  document.getElementById("clock").innerText =
    new Date().toLocaleTimeString()
}

setInterval(updateClock,1000)


// ================= CONFIG =================

// 🔥 SET STATION HERE
const STATION="KL SENTRAL"
document.getElementById("stationName").innerText=STATION


// ================= TIME =================

function getMinutes(time){

  if(!time) return 9999

  let now=new Date()
  let cur=now.getHours()*60+now.getMinutes()

  let [h,m]=time.split(":")
  let t=parseInt(h)*60+parseInt(m)

  return t-cur
}


// ================= ROUTE =================

function getDestination(trainNo){

  let route=data
    .filter(d=>d.train_no==trainNo && d.station_name!="Unknown")
    .sort((a,b)=>a.tmt_seq_no-b.tmt_seq_no)

  return route[route.length-1]?.station_name || "-"
}


// ================= CONTROL =================

function applyLiveControl(rows){

  return rows.filter(r=>{

    const c=liveData.train_control?.[r.train_no]

    if(c?.running==="X") return false

    if(!liveData.settings.show_additional && r.train_service==="A"){
      return false
    }

    return true

  }).map(r=>{

    const c=liveData.train_control?.[r.train_no]

    if(c?.delay_min){

      return {
        ...r,
        departure:addMinutes(r.departure,c.delay_min),
        delayed:true
      }

    }

    return r

  })

}

function addMinutes(time,mins){

  if(!time) return time

  let [h,m]=time.split(":").map(Number)
  let total=h*60+m+mins

  return String(Math.floor(total/60)%24).padStart(2,"0")+":"+
         String(total%60).padStart(2,"0")
}


// ================= STATUS =================

function getStatus(r){

  if(r.delayed) return {text:"DELAYED", class:"delayed"}

  let m=r.minutes

  if(m<=0) return {text:"DEPARTED", class:""}

  if(m<=3) return {text:"FINAL CALL", class:"finalcall"}

  if(m<=10) return {text:"BOARDING", class:"boarding"}

  return {text:"ON SCHEDULE", class:""}

}


// ================= PREPARE =================

function prepare(){

  let rows=data.filter(d=>d.station_name==STATION)

  rows=applyLiveControl(rows)

  rows=rows.map(r=>{

    return {
      ...r,
      minutes:getMinutes(r.departure),
      destination:getDestination(r.train_no)
    }

  })

  rows=rows.filter(r=>r.minutes>=-10 && r.minutes<=180)

  let unique={}
  rows.forEach(r=>{
    if(!unique[r.train_no] || r.minutes < unique[r.train_no].minutes){
      unique[r.train_no]=r
    }
  })

  currentRows=Object.values(unique)
  currentRows.sort((a,b)=>a.minutes-b.minutes)

}


// ================= RENDER =================

function render(){

  prepare()

  let start=page*PAGE_SIZE
  let rows=currentRows.slice(start,start+PAGE_SIZE)

  let html=""

  rows.forEach((r,i)=>{

    let status=getStatus(r)

    html+=`
    <tr class="${i==0?'next':''}">
      <td>${r.train_no}</td>
      <td>${r.destination}</td>
      <td>${r.departure||"-"}</td>
      <td class="${status.class}">${status.text}</td>
    </tr>
    `
  })

  document.getElementById("board").innerHTML=html

  page++
  if(page*PAGE_SIZE>=currentRows.length){
    page=0
  }

}


// ================= AUTO LOOP =================

// render setiap 1 sec
setInterval(render,1000)

// scroll page setiap 5 sec
setInterval(()=>{ page++ },5000)

</script>

</body>
</html>
