<!DOCTYPE html>

<html>

<head>
<meta charset="UTF-8">
<title>PIDS Admin PRO</title>

<style>

body{
  background:#111;
  color:white;
  font-family:Arial;
  padding:20px;
}

h1{ color:#00ffcc; }

.controls{
  margin-bottom:15px;
}

input,select,button{
  margin:5px;
  padding:5px;
}

.trainRow{
  border-bottom:1px solid #333;
  padding:8px;
}

.additional{
  color:orange;
  font-weight:bold;
}

</style>

</head>

<body>

<h1>PIDS ADMIN PRO</h1>

<div class="controls">

🔍 Search: <input type="text" id="search" placeholder="Train no...">

  <br>

<label><input type="checkbox" id="showNormal" checked> Normal</label> <label><input type="checkbox" id="showAdditional" checked> Additional</label>

</div>

<hr>

<div class="controls">

⚡ BULK ACTION:

Delay All: <input type="number" id="bulkDelay" value="0">

<button onclick="applyBulkDelay()">Apply</button>

<button onclick="stopAll()">Stop All</button> <button onclick="resetAll()">Reset</button>

</div>

<hr>

<div id="list"></div>

<script>

let data=[]
let liveData={ train_control:{}, settings:{ show_additional:true } }


// ================= LOAD =================

async function load(){

  const res = await fetch("data.json")
  data = await res.json()

  const stored = localStorage.getItem("liveData")
  if(stored){
    liveData = JSON.parse(stored)
  }

  render()

}

load()


// ================= RENDER =================

function render(){

  const search = document.getElementById("search").value.toLowerCase()
  const showNormal = document.getElementById("showNormal").checked
  const showAdditional = document.getElementById("showAdditional").checked

  const trainMap={}

  data.forEach(d=>{
    if(!trainMap[d.train_no]){
      trainMap[d.train_no]=d.train_service
    }
  })

  let html=""

  Object.keys(trainMap).sort().forEach(t=>{

    const service=trainMap[t]

    // FILTER
    if(service==="N" && !showNormal) return
    if(service==="A" && !showAdditional) return

    if(search && !t.includes(search)) return

    const c = liveData.train_control[t] || {}

    const display = service==="A"
      ? `<span class="additional">${t}*</span>`
      : t

    html += `
    <div class="trainRow">

      <b>${display}</b>

      Status:
      <select id="s_${t}">
        <option value="R" ${c.running==="R"?"selected":""}>Running</option>
        <option value="X" ${c.running==="X"?"selected":""}>Stop</option>
      </select>

      Delay:
      <input id="d_${t}" type="number" value="${c.delay_min || 0}">

      <button onclick="save('${t}')">Save</button>

    </div>
    `

  })

  document.getElementById("list").innerHTML = html

}


// ================= SAVE =================

function save(train){

  const status=document.getElementById("s_"+train).value
  const delay=Number(document.getElementById("d_"+train).value)

  liveData.train_control[train]={
    running:status,
    delay_min:delay
  }

  localStorage.setItem("liveData", JSON.stringify(liveData))

  alert("Updated")

}


// ================= BULK =================

function applyBulkDelay(){

  const delay = Number(document.getElementById("bulkDelay").value)

  Object.keys(getTrainMap()).forEach(t=>{
    liveData.train_control[t]={
      running:"R",
      delay_min:delay
    }
  })

  saveStorage()
  render()

}


function stopAll(){

  Object.keys(getTrainMap()).forEach(t=>{
    liveData.train_control[t]={
      running:"X",
      delay_min:0
    }
  })

  saveStorage()
  render()

}


function resetAll(){

  liveData.train_control={}
  saveStorage()
  render()

}


// ================= UTIL =================

function getTrainMap(){

  const map={}
  data.forEach(d=>{
    if(!map[d.train_no]){
      map[d.train_no]=true
    }
  })

  return map

}

function saveStorage(){
  localStorage.setItem("liveData", JSON.stringify(liveData))
}


// ================= EVENT =================

document.getElementById("search").addEventListener("input", render)
document.getElementById("showNormal").addEventListener("change", render)
document.getElementById("showAdditional").addEventListener("change", render)

</script>

</body>

</html>
